# ═══════════════════════════════════════════════════════════════════
# GDS AI Playoff Draft — Configuration
# April 18, 2026
# ═══════════════════════════════════════════════════════════════════

# ── Draft Rules ─────────────────────────────────────────────────
draft:
  rounds: 10
  roster_format:
    F: 7     # Forwards
    D: 2     # Defensemen
    G: 1     # Goalies
  scoring:
    goal: 1
    assist: 1
    win: 1       # Goalies only
    shutout: 2   # Goalies only (bonus on top of win)
  tiebreaker_question: "How many total goals will be scored across the entire 2026 Stanley Cup Playoffs?"

# ── Draft Order ──────────────────────────────────────────────────
# Grok gets pick 1 as defending champion.
# Picks 2-12 randomized at runtime.
defending_champion: "Grok"

# ── Models ───────────────────────────────────────────────────────
# All verified live on OpenRouter as of April 18, 2026.
models:
  Grok:
    slug: "x-ai/grok-4.20"
    provider: "xAI"
    backstory: "Defending champion from the GDS regular season draft. Won with 832 points."
  GPT-5:
    slug: "openai/gpt-5.4"
    provider: "OpenAI"
    backstory: "OpenAI's flagship. The presumptive favorite."
  Claude:
    slug: "anthropic/claude-opus-4.7"
    provider: "Anthropic"
    backstory: "Released just 2 days ago. Brand new and untested in competition."
  Gemini:
    slug: "google/gemini-3.1-pro-preview"
    provider: "Google DeepMind"
    backstory: "Dropped from the regular season draft for failing to respond. Back for revenge with Google's latest flagship."
  DeepSeek:
    slug: "deepseek/deepseek-r1"
    provider: "DeepSeek"
    backstory: "A reasoning-first model. Thinks deeply before speaking. The budget underdog."
  Llama 4:
    slug: "meta-llama/llama-4-maverick"
    provider: "Meta"
    backstory: "Meta's 400B open-weight beast. Also dropped from Run 1. Double redemption."
  Mistral:
    slug: "mistralai/mistral-large-2512"
    provider: "Mistral AI"
    backstory: "The French contender. Mistral's flagship model."
  Qwen:
    slug: "qwen/qwen3-235b-a22b"
    provider: "Alibaba (Qwen)"
    backstory: "Finished dead last in the regular season draft as QwQ-32B. Now upgraded to a 235B MoE beast. Revenge tour."
  Perplexity:
    slug: "perplexity/sonar-pro"
    provider: "Perplexity AI"
    backstory: "Has built-in internet search. Possible unfair advantage?"
  Hermes:
    slug: "nousresearch/hermes-4-405b"
    provider: "Nous Research"
    backstory: "The fine-tuned wildcard. Built for tool use and personality."
  Cohere:
    slug: "cohere/command-a"
    provider: "Cohere"
    backstory: "Enterprise AI making its competitive debut. 111B params, 256K context."
  Gemma:
    slug: "google/gemma-4-31b-it"
    provider: "Google DeepMind"
    backstory: "Google's scrappy open model. 31B parameters vs 400B+ rivals. The lightweight underdog."

# ── API Settings ─────────────────────────────────────────────────
api:
  base_url: "https://openrouter.ai/api/v1/chat/completions"
  referer: "https://gamedaysuits.ca"
  app_title: "GDS AI Playoff Draft 2026"
  timeout: 120        # seconds — some reasoning models are slow
  max_retries: 3
  retry_delays: [2, 4, 8]  # exponential backoff (seconds)
  max_concurrent: 6   # parallelism cap for Phase 1

# ── Tool Settings ────────────────────────────────────────────────
tools:
  # Web search backend — uses basic Perplexity Sonar (cheap/fast)
  # This is separate from the Perplexity competitor who uses sonar-pro
  search_model: "perplexity/sonar"
  search_max_tokens: 1500       # was 300 — let Sonar give full, detailed answers
  phase1_search_limit: 3        # max web_search calls during identity phase
  phase1_self_research_limit: 1 # max self_research calls during identity phase
  phase2_search_limit: 1        # max web_search calls per pick
  scratchpad_max_tokens: 2000   # was 500 — let models keep detailed running notes

# ── Token Budgets ────────────────────────────────────────────────
# Generous caps — these are safety rails, not optimization targets.
# Budget is $1000, cost is ~$100. Let the models breathe.
token_budgets:
  system_prompt: 600
  strategy_doc: 1500            # was 300 — room for a real game plan
  scouting_notes: 3000          # was 500 — full 40-player rankings
  scratchpad: 2000              # was 500 — detailed running notes
  draft_state: 600              # was 300 — all 12 rosters visible
  available_players: 1500       # was 500 — see the full board
  recent_activity: 1000         # was 300 — full round of context
  research_results: 1500        # was 300 — match search output cap

# ── Output Settings ──────────────────────────────────────────────
output:
  dir: "output"
  json_log: "draft_log.json"
  markdown_log: "draft_log.md"
  personas_file: "personas.json"
  results_csv: "draft_results.csv"

# ── Reaction Settings ────────────────────────────────────────────
reactions:
  count: 3             # number of random GMs that react per pick
  max_chars: 300       # max characters per chirp reaction
